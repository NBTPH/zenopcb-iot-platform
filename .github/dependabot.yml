# Dependabot keeps GitHub Actions versions current.
#
# Note: vendor libraries under src/vendor/ (ArduinoJson, PubSubClient, TinyGSM,
# Preferences, FlashStorage, StreamDebugger) are NOT tracked by Dependabot —
# they are intentionally vendored copies. Updating them is a manual process:
# diff against upstream, copy in, re-namespace if needed, run the full release
# checklist in doc/RELEASE.md.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    labels:
      - dependencies
      - ci
